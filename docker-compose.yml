version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dynamic-pricing-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dynamic_pricing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dynamic-pricing-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dynamic_pricing
      SECRET_KEY: your-super-secret-key-change-this-in-production
      REFRESH_SECRET_KEY: your-refresh-secret-key-change-this-in-production
      FRONTEND_URL: http://localhost:5173
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dynamic-pricing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
