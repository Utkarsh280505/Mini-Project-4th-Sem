<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Pricing Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Dynamic Pricing Optimization Engine</h1>
            <p>Real-time ride pricing predictions powered by Machine Learning</p>
        </header>

        <div class="main-content">
            <div class="input-panel">
                <h2>Enter Ride Parameters</h2>
                <form id="pricingForm">
                    <div class="form-group">
                        <label for="riders">Number of Riders:</label>
                        <input type="range" id="riders" name="riders" min="1" max="50" value="5">
                        <span id="ridersValue">5</span>
                    </div>

                    <div class="form-group">
                        <label for="drivers">Available Drivers:</label>
                        <input type="range" id="drivers" name="drivers" min="1" max="50" value="10">
                        <span id="driversValue">10</span>
                    </div>

                    <div class="form-group">
                        <label for="duration">Ride Duration (mins):</label>
                        <input type="range" id="duration" name="duration" min="5" max="120" value="20">
                        <span id="durationValue">20</span>
                    </div>

                    <div class="form-group">
                        <label for="vehicle">Vehicle Type:</label>
                        <select id="vehicle" name="vehicle">
                            <option value="0">Economy</option>
                            <option value="1">Premium</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="is_peak">Peak Hours:</label>
                        <select id="is_peak" name="is_peak">
                            <option value="0">Off-Peak</option>
                            <option value="1">Peak Hours</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="traffic">Traffic Level (0-5):</label>
                        <input type="range" id="traffic" name="traffic" min="0" max="5" value="2">
                        <span id="trafficValue">2</span>
                    </div>

                    <button type="button" class="btn-predict" onclick="predictPrice()">
                        Calculate Price
                    </button>
                </form>
            </div>

            <div class="results-panel">
                <h2>Pricing Results</h2>
                <div class="result-card">
                    <div class="result-item">
                        <label>Base Price:</label>
                        <span id="basePrice" class="price">₹0.00</span>
                    </div>
                    <div class="result-item">
                        <label>ML Predicted Price:</label>
                        <span id="finalPrice" class="price highlight">₹0.00</span>
                    </div>
                    <div class="result-item">
                        <label>Demand/Supply Ratio:</label>
                        <span id="ratio">0.00</span>
                    </div>
                </div>
                <div id="errorMessage" class="error"></div>
            </div>
        </div>

        <footer>
            <p>Dynamic Pricing Optimization System | 4th Semester Mini Project</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
