<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Price Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-3.5.0.min.js"></script>
</head>

<body>
    <div class="app-background"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    
    <nav class="navbar glass-panel">
        <div class="navbar-content">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Dynamic Price Optimizer</span>
            </div>
            <div class="nav-actions">
                <div class="tagline">AI-Powered Ride Fare Intelligence</div>
                <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard">
            <div class="control-panel glass-panel fade-in">
                <h2><span class="icon">⚙️</span> Market Parameters</h2>

                <div class="control-group">
                    <label for="riders">👥 Riders: <span class="badge" id="ridersValue">20</span></label>
                    <input type="range" id="riders" min="1" max="100" value="20" class="slider-glow">
                </div>

                <div class="control-group">
                    <label for="drivers">🚗 Drivers: <span class="badge" id="driversValue">10</span></label>
                    <input type="range" id="drivers" min="1" max="50" value="10" class="slider-glow">
                </div>

                <div class="control-group">
                    <label for="duration">⏱️ Duration: <span class="badge"><span id="durationValue">25</span>m</span></label>
                    <input type="range" id="duration" min="5" max="120" value="25" class="slider-glow">
                </div>

                <div class="control-group">
                    <label for="vehicle">🏎️ Vehicle</label>
                    <div class="select-wrapper">
                        <select id="vehicle" class="select-glow">
                            <option value="0">Economy</option>
                            <option value="1">Premium</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label for="hour">🕒 Hour: <span class="badge" id="hourValue">12</span></label>
                    <input type="range" id="hour" min="0" max="23" value="12" class="slider-glow">
                </div>

                <div class="control-group">
                    <label for="traffic">🚦 Traffic: <span class="badge" id="trafficValue">2</span></label>
                    <input type="range" id="traffic" min="1" max="5" value="2" class="slider-glow">
                </div>

                <button class="btn-glow mt-4" onclick="calculatePrice()">
                    <span class="btn-content">⚡ Calculate Price</span>
                </button>
            </div>

            <div class="results-panel glass-panel fade-in-delay" id="resultsPanel" style="display:none;">
                <h2 class="results-title"><span class="icon">📊</span> Optimization Results</h2>
                
                <div class="metrics">
                    <div class="metric-card primary">
                        <div class="metric-icon">💰</div>
                        <div class="metric-content">
                            <div class="metric-label">Optimized Fare</div>
                            <div class="metric-value counter" id="priceValue">₹0</div>
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-icon">📉</div>
                        <div class="metric-content">
                            <div class="metric-label">Base Price</div>
                            <div class="metric-value" id="baseValue">₹0</div>
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-icon">📈</div>
                        <div class="metric-content">
                            <div class="metric-label">Surge Ratio</div>
                            <div class="metric-value" id="ratioValue">0x</div>
                        </div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-icon">🚦</div>
                        <div class="metric-content">
                            <div class="metric-label">Traffic Impact</div>
                            <div class="metric-value" id="trafficMetric">2</div>
                        </div>
                    </div>
                </div>
                
                <div class="chart-container mt-4 glass-panel" style="padding: 20px; border-radius: 15px; margin-top: 30px;">
                    <div id="priceChart" style="width:100%; height:300px;"></div>
                </div>
                
                <div class="insights mt-4 glass-panel fade-in-delay" style="padding: 25px; border-radius: 15px; margin-top: 30px;">
                    <h3 style="margin-bottom: 20px; font-size: 1.2rem; color: #f8fafc;"><span class="icon">💡</span> Smart Insights</h3>
                    <div class="insight-cards" style="display: grid; gap: 15px;">
                        <div class="insight-card" id="demandInsight" style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; border-left: 4px solid #3b82f6;"></div>
                        <div class="insight-card" id="vehicleInsight" style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; border-left: 4px solid #10b981;"></div>
                        <div class="insight-card" id="surgeInsight" style="background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 10px; border-left: 4px solid #f59e0b;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
