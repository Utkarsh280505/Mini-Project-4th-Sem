<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Price Optimizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">⚡ Dynamic Price Optimizer</div>
            <div class="tagline">AI-Powered Ride Fare Intelligence</div>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard">
            <div class="control-panel">
                <h2>⚙️ Market Parameters</h2>
                
                <div class="control-group">
                    <label for="riders">👥 Riders: <span id="ridersValue">20</span></label>
                    <input type="range" id="riders" min="1" max="100" value="20" class="slider">
                </div>

                <div class="control-group">
                    <label for="drivers">🚗 Drivers: <span id="driversValue">10</span></label>
                    <input type="range" id="drivers" min="1" max="50" value="10" class="slider">
                </div>

                <div class="control-group">
                    <label for="duration">⏱️ Duration: <span id="durationValue">25</span>min</label>
                    <input type="range" id="duration" min="5" max="120" value="25" class="slider">
                </div>

                <div class="control-group">
                    <label for="vehicle">🏎️ Vehicle:</label>
                    <select id="vehicle" class="select">
                        <option value="0">Economy</option>
                        <option value="1">Premium</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="hour">🕒 Hour: <span id="hourValue">12</span></label>
                    <input type="range" id="hour" min="0" max="23" value="12" class="slider">
                </div>

                <div class="control-group">
                    <label for="traffic">🚦 Traffic: <span id="trafficValue">2</span></label>
                    <input type="range" id="traffic" min="1" max="5" value="2" class="slider">
                </div>

                <button class="btn-calculate" onclick="calculatePrice()">⚡ Calculate Price</button>
            </div>

            <div class="results-panel" id="resultsPanel" style="display:none;">
                <div class="metrics">
                    <div class="metric-card">
                        <div class="metric-label">💰 Optimized Fare</div>
                        <div class="metric-value" id="priceValue">₹0</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">📊 Base Price</div>
                        <div class="metric-value" id="baseValue">₹0</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">📈 Ratio</div>
                        <div class="metric-value" id="ratioValue">0x</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">���� Traffic</div>
                        <div class="metric-value" id="trafficMetric">2</div>
                    </div>
                </div>

                <div class="insights">
                    <h3>💡 Smart Insights</h3>
                    <div class="insight-cards">
                        <div class="insight-card" id="demandInsight"></div>
                        <div class="insight-card" id="vehicleInsight"></div>
                        <div class="insight-card" id="surgeInsight"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
