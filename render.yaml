services:
  # Backend API Service
  - type: web
    name: dynamic-pricing-backend
    runtime: python
    pythonVersion: 3.11
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
      - key: SECRET_KEY
        scope: build,runtime
      - key: REFRESH_SECRET_KEY
        scope: build,runtime
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        fromService:
          name: dynamic-pricing-frontend
          type: web
          property: url

  # Frontend Service
  - type: web
    name: dynamic-pricing-frontend
    runtime: node
    nodeVersion: 20
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run preview"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: dynamic-pricing-backend
          type: web
          property: url
