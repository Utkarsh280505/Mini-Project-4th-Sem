services:
  - type: web
    name: dynamic-pricing-backend
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: dynamic-pricing-frontend
    env: static
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && rm -rf dist && cp -r frontend/dist dist
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
