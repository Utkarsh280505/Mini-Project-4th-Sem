<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dynamic Price Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-glass">
            <div class="login-header">
                <h2>⚡ Admin Portal</h2>
                <p>Sign in to access price optimization</p>
            </div>
            
            {% if error %}
            <div class="login-error">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST" class="login-form">
                <div class="input-group">
                    <input type="text" id="username" name="username" required autocomplete="off" placeholder=" ">
                    <label for="username">Username</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" name="password" required autocomplete="off" placeholder=" ">
                    <label for="password">Password</label>
                </div>
                
                <button type="submit" class="btn-glow">Sign In</button>
            </form>
            
            <div class="login-footer">
                <p>Default credentials: admin / password</p>
            </div>
        </div>
    </div>
</body>
</html>
